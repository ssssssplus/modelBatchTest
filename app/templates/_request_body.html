<section class="panel request-config-panel">
  <div class="request-editor-header">
    <div>
      <h2>请求配置</h2>
      <p>配置模型 API 调用时使用的请求头和 JSON 请求体。</p>
    </div>
    <div class="button-group">
      <button id="importCurlToggle" type="button" class="secondary">导入 curl</button>
      <button id="formatRequestBody" type="button" class="secondary">格式化 JSON</button>
      <button id="resetRequestBody" type="button" class="secondary">重置</button>
    </div>
  </div>

  <div id="curlImportPanel" class="curl-import-panel hidden">
    <label>
      curl 命令
      <textarea id="curlCommand" rows="5" placeholder="粘贴 curl 命令，支持 -H 请求头和 -d / --data-raw JSON 请求体"></textarea>
    </label>
    <div class="row">
      <button id="importCurlConfirm" type="button">导入请求配置</button>
      <button id="importCurlCancel" type="button" class="secondary">取消</button>
    </div>
  </div>

  <div class="request-config-section">
    <div class="request-config-section-title">
      <div>
        <h3>请求头</h3>
        <p>用于 Authorization、Content-Type 等 HTTP Header。</p>
      </div>
      <button id="addHeaderRow" type="button" class="secondary">新增请求头</button>
    </div>
    <div class="headers-table-wrap">
      <table class="headers-table">
        <thead>
          <tr>
            <th>Header</th>
            <th>Value</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="requestHeadersBody"></tbody>
      </table>
    </div>
  </div>

  <div class="request-config-section">
    <div class="request-config-section-title">
      <div>
        <h3>请求体 JSON</h3>
        <p>当前 prompt 会自动写入最后一条 user message 的 content。</p>
      </div>
    </div>
    <textarea id="requestBody" class="code-editor" rows="16" spellcheck="false"></textarea>
    <div id="requestBodyStatus" class="muted"></div>
  </div>
</section>
