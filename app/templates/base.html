<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}模型批量测试平台{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    <header class="shell-header">
      <div class="brand">
        <span class="brand-mark">M</span>
        <div>
          <h1>模型批量测试平台</h1>
          <p>本地与内网模型 API 的调试、批量评测和压测</p>
        </div>
      </div>
      <div class="user-menu">
        <span class="badge">{{ session.user.username if session.user else '未登录' }}</span>
        <a class="logout-link" href="{{ url_for('main.logout') }}">退出</a>
      </div>
    </header>

    <nav class="nav-tabs" aria-label="主导航">
      <a class="{{ 'active' if active_page == 'home' else '' }}" href="{{ url_for('main.index') }}">概览</a>
      <a class="{{ 'active' if active_page == 'single' else '' }}" href="{{ url_for('main.single_page') }}">单次测试</a>
      <a class="{{ 'active' if active_page == 'batch' else '' }}" href="{{ url_for('main.batch_page') }}">批量测试</a>
      <a class="{{ 'active' if active_page == 'pressure' else '' }}" href="{{ url_for('main.pressure_page') }}">压测</a>
    </nav>

    <main class="page">
      {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
